paths:
  ffmpeg: ffmpeg
  ffprobe: ffprobe
  vspipe: vspipe
  work_dir: ./work

capture:
  # For already-captured files, you may not use capture at all.
  # If you do want to ingest from a DirectShow device, edit pipeline/capture/ffmpeg_capture.py.
  input_container: avi
  lossless_codec: ffv1   # or 'utvideo'
  audio_codec: pcm_s16le

profiling:
  sample_frames: 40
  sample_stride: 150      # take every Nth frame for quick profiling
  max_seconds: 120        # cap scan window
  default_field_order: tff # 'tff' or 'bff'
  chroma_phase_default_px: 0.25  # LaserDisc-ish starting point (tweak per chain)

processing:
  output_container: mkv
  encode:
    video_codec: ffv1     # keep lossless through processing; later encode to H.264/H.265
    crf: 16
    preset: medium
  qtgmc:
    preset: Slow
    tff: true
    sharpness: 0.2

resolve_luts:
  size: 33
  name_prefix: "preview_"
